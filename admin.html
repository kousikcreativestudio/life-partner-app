<!DOCTYPE html>
<html>
<head>
  <title>🔐 Admin Panel</title>
</head>

<body style="font-family:Arial;text-align:center">

<h1>🔐 Admin Panel</h1>

<button onclick="loadData()">Show Searches</button>
<button onclick="clearData()">Clear All</button>

<div id="data" style="margin-top:20px;"></div>

<script>
function loadData() {

  let data = JSON.parse(localStorage.getItem("loveData")) || [];

  if (data.length === 0) {
    document.getElementById("data").innerHTML = "No data found";
    return;
  }

  let html = "";

  data.forEach(item => {
    html += `
      <p>
        <b>${item.name1}</b> ❤️ <b>${item.name2}</b> = ${item.percent}%<br>
        <small>${item.time}</small>
      </p>
      <hr>
    `;
  });

  document.getElementById("data").innerHTML = html;
}

function clearData() {
  localStorage.removeItem("loveData");
  document.getElementById("data").innerHTML = "";
}
</script>

</body>
</html>
