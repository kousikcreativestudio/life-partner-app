<!DOCTYPE html>
<html>
<head>
  <title>Find Your Life Partner ❤️</title>

  <style>
    body {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial;
      text-align: center;
      padding-top: 80px;
    }

    h1 {
      color: #ff2e63;
    }

    input, select {
      padding: 10px;
      margin: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #ff2e63;
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    #result {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h1>💖 Find Your Life Partner 💖</h1>

  <!-- NAME -->
  <input type="text" id="username" placeholder="Enter your name"><br>

  <!-- GENDER -->
  <select id="gender">
    <option value="">Select Gender</option>
    <option value="male">Male</option>
    <option value="female">Female</option>
  </select><br>

  <!-- COLOR -->
  <select id="color">
    <option value="">Select Favorite Color</option>
    <option value="red">Red</option>
    <option value="blue">Blue</option>
    <option value="pink">Pink</option>
    <option value="black">Black</option>
  </select><br>

  <button onclick="findPartner()">Find Now</button>

  <div id="result"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "PASTE_YOUR_API_KEY",
      authDomain: "life-partner-app.firebaseapp.com",
      projectId: "life-partner-app",
      storageBucket: "life-partner-app.appspot.com",
      messagingSenderId: "376129371589",
      appId: "PASTE_YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function findPartner() {
      const userName = document.getElementById("username").value;
      const gender = document.getElementById("gender").value;
      const color = document.getElementById("color").value;

      if (!userName || !gender || !color) {
        document.getElementById("result").innerText =
          "Please fill all fields!";
        return;
      }

      const querySnapshot = await getDocs(collection(db, "names"));

      let maleNames = [];
      let femaleNames = [];

      querySnapshot.forEach((doc) => {
        const data = doc.data();
        if (data.gender === "male") {
          maleNames.push(data.name);
        } else if (data.gender === "female") {
          femaleNames.push(data.name);
        }
      });

      let partnerName = "";

      if (gender === "male") {
        partnerName = femaleNames[Math.floor(Math.random() * femaleNames.length)];
      } else {
        partnerName = maleNames[Math.floor(Math.random() * maleNames.length)];
      }

      // 💖 MATCH %
      const match = Math.floor(Math.random() * 41) + 60;

      // 🎉 FINAL OUTPUT
      document.getElementById("result").innerHTML =
        `<span style="color:#ff2e63">${userName}</span> ❤️ 
         <span style="color:#ff2e63">${partnerName}</span><br>
         💖 <b>${match}% Match</b> (${color})`;
    }

    window.findPartner = findPartner;
  </script>

</body>
</html>
