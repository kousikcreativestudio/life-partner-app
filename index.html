<!DOCTYPE html>
<html>
<head>
  <title>💖 Love Calculator</title>
</head>

<body style="text-align:center;font-family:Arial;background:pink">

<h1>💖 Love Match 💖</h1>

<input id="name1" placeholder="Your Name"><br><br>
<input id="name2" placeholder="Love Name"><br><br>

<button onclick="calculate()">Check Love</button>

<h2 id="result"></h2>

<script>
function calculate() {

  let n1 = document.getElementById("name1").value.trim();
  let n2 = document.getElementById("name2").value.trim();

  if (!n1 || !n2) {
    alert("Enter both names");
    return;
  }

  let total = 0;
  let str = n1 + n2;

  for (let i = 0; i < str.length; i++) {
    total += str.charCodeAt(i);
  }

  let percent = (total % 51) + 50;

  // 👤 viewer only sees %
  document.getElementById("result").innerHTML =
    `❤️ Match: ${percent}%`;

  // 🔐 save for admin
  let data = JSON.parse(localStorage.getItem("loveData")) || [];

  data.push({
    name1: n1,
    name2: n2,
    percent: percent,
    time: new Date().toLocaleString()
  });

  localStorage.setItem("loveData", JSON.stringify(data));
}
</script>

</body>
</html>
