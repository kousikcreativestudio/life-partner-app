<!DOCTYPE html>
<html>
<head>
  <title>My Custom Location Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    #map {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // ⭐ STEP 1: PUT YOUR LOCATION HERE
  // Replace these values with your exact coordinates
  var lat = 14.478851;   // <-- change if needed
  var lng = 78.825029;   // <-- change if needed

  // ⭐ STEP 2: CREATE MAP
  var map = L.map('map').setView([lat, lng], 16);

  // ⭐ STEP 3: ADD OPENSTREETMAP TILE
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  // ⭐ STEP 4: CUSTOM MARKER ICON
  var customIcon = L.icon({
    iconUrl: 'https://i.ibb.co/fztWJFdH/Chat-GPT-Image-Jun-13-2026-11-42-53-AM.png',
    iconSize: [60, 60]
  });

  // ⭐ STEP 5: ADD MARKER
  L.marker([lat, lng], { icon: customIcon })
    .addTo(map)
    .bindPopup("📍 My Location")
    .openPopup();

</script>

</body>
</html>
