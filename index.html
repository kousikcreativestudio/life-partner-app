<!DOCTYPE html>
<html>
<head>
  <title>Find Your Life Partner ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
    }

    h1 {
      margin-top: 50px;
      color: #ff2e63;
    }

    input, select, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }

    button {
      background: #ff2e63;
      color: white;
      border: none;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>💖 Find Your Life Partner 💖</h1>

<input type="text" id="name" placeholder="Enter your name">

<br>

<select id="gender">
  <option value="male">Male</option>
  <option value="female">Female</option>
</select>

<br>

<select id="color">
  <option value="red">Red</option>
  <option value="blue">Blue</option>
  <option value="pink">Pink</option>
</select>

<br>

<button onclick="findMatch()">Find Now</button>

<div id="result"></div>

<script>
  const maleNames = ["Arjun", "Sai", "Ramesh", "Akash", "Kousik"];
  const femaleNames = ["Rama", "Priya", "Sita", "Anjali", "Keerthi"];

  function findMatch() {
    const name = document.getElementById("name").value;
    const gender = document.getElementById("gender").value;

    if (name === "") {
      alert("Enter your name");
      return;
    }

    let matchName;

    if (gender === "male") {
      matchName = femaleNames[Math.floor(Math.random() * femaleNames.length)];
    } else {
      matchName = maleNames[Math.floor(Math.random() * maleNames.length)];
    }

    const matchPercent = Math.floor(Math.random() * 21) + 80; // 80% - 100%

    document.getElementById("result").innerHTML =
      name + " ❤️ " + matchName + "<br>Match: " + matchPercent + "%";
  }
</script>

</body>
</html>
