<!DOCTYPE html>
<html>
<head>
  <title>Find Your Life Partner ❤️</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
    }

    h1 {
      margin-top: 50px;
      color: #ff2e63;
    }

    input, select, button {
      padding: 10px;
      margin: 10px;
      font-size: 16px;
    }

    button {
      background: #ff2e63;
      color: white;
      border: none;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>💖 Find Your Life Partner 💖</h1>

<input type="text" id="name" placeholder="Enter your name">

<br>

<select id="color">
  <option value="red">Red ❤️</option>
  <option value="blue">Blue 💙</option>
  <option value="pink">Pink 💖</option>
</select>

<br>

<button onclick="findMatch()">Find Now</button>

<div id="result"></div>

<script>
  // 👇 Your database (you can later connect Firebase)
  const maleNames = ["Arjun", "Sai", "Ramesh", "Akash", "Kousik"];
  const femaleNames = ["Rama", "Priya", "Sita", "Anjali", "Keerthi"];

  function findMatch() {
    const name = document.getElementById("name").value.trim();
    const color = document.getElementById("color").value;

    if (name === "") {
      alert("Enter your name");
      return;
    }

    let matchName;

    // 🔍 Detect gender
    if (maleNames.map(n => n.toLowerCase()).includes(name.toLowerCase())) {
      // male → female
      matchName = femaleNames[Math.floor(Math.random() * femaleNames.length)];
    } 
    else if (femaleNames.map(n => n.toLowerCase()).includes(name.toLowerCase())) {
      // female → male
      matchName = maleNames[Math.floor(Math.random() * maleNames.length)];
    } 
    else {
      // unknown → random female (default)
      matchName = femaleNames[Math.floor(Math.random() * femaleNames.length)];
    }

    const percent = Math.floor(Math.random() * 21) + 80;

    // 🎨 color effect
    document.body.style.background =
      color === "blue" ? "linear-gradient(to right, #89f7fe, #66a6ff)" :
      color === "pink" ? "linear-gradient(to right, #ff9a9e, #fecfef)" :
      "linear-gradient(to right, #ff9a9e, #fad0c4)";

    document.getElementById("result").innerHTML =
      `${name} ❤️ ${matchName} <br> Match: ${percent}%`;
  }
</script>

</body>
</html>
