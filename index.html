<script>
async function findMatch() {
  const inputName = document.getElementById("name").value.trim().toLowerCase();
  const color = document.getElementById("color").value;

  const snapshot = await getDocs(collection(db, "names"));

  let maleList = [];
  let femaleList = [];

  snapshot.forEach(doc => {
    const data = doc.data();

    if (data.male) maleList.push(data.male.toLowerCase());
    if (data.female) femaleList.push(data.female.toLowerCase());
  });

  let matchName = "";

  // ✅ IF USER IS MALE → SHOW FEMALE
  if (maleList.includes(inputName)) {
    matchName = femaleList[Math.floor(Math.random() * femaleList.length)];
  }
  // ✅ IF USER IS FEMALE → SHOW MALE
  else if (femaleList.includes(inputName)) {
    matchName = maleList[Math.floor(Math.random() * maleList.length)];
  }
  // ❗ IF NOT FOUND → RANDOM FEMALE
  else {
    matchName = femaleList[Math.floor(Math.random() * femaleList.length)];
  }

  const percent = Math.floor(Math.random() * 21) + 80;

  document.getElementById("result").innerHTML =
    `${inputName} ❤️ ${matchName} <br> Match: ${percent}%`;
}
</script>
