<!DOCTYPE html>
<html>
<head>
  <title>Find Your Life Partner ❤️</title>

  <style>
    body {
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    h1 {
      color: #ff2e63;
    }

    input {
      padding: 10px;
      width: 220px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
    }

    button {
      background-color: #ff2e63;
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    #result {
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #333;
    }
  </style>
</head>

<body>

  <h1>💖 Find Your Life Partner 💖</h1>

  <!-- NAME INPUT -->
  <input type="text" id="username" placeholder="Enter your name" /><br>

  <!-- BUTTON -->
  <button onclick="findPartner()">Find Now</button>

  <!-- RESULT -->
  <div id="result"></div>

  <!-- FIREBASE + LOGIC -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "PASTE_YOUR_API_KEY",
      authDomain: "life-partner-app.firebaseapp.com",
      projectId: "life-partner-app",
      storageBucket: "life-partner-app.appspot.com",
      messagingSenderId: "376129371589",
      appId: "PASTE_YOUR_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function findPartner() {
      const userName = document.getElementById("username").value;

      if (userName === "") {
        document.getElementById("result").innerText = "Please enter your name";
        return;
      }

      const querySnapshot = await getDocs(collection(db, "names"));

      let names = [];
      querySnapshot.forEach((doc) => {
        const data = doc.data();
        if (data.name) {
          names.push(data.name);
        }
      });

      if (names.length === 0) {
        document.getElementById("result").innerText = "No names found";
        return;
      }

      const randomName = names[Math.floor(Math.random() * names.length)];

      document.getElementById("result").innerText =
        userName + " ❤️ " + randomName;
    }

    window.findPartner = findPartner;
  </script>

</body>
</html>
